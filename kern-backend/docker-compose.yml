services:
  # ─── Infrastructure ───────────────────────────────────────────────────────────
  consul:
    image: consul:1.15.4
    container_name: kern-consul
    restart: unless-stopped
    ports:
      - "8500:8500" # UI + API
    command: agent -dev -client=0.0.0.0 -ui
    networks:
      - kern-network
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: kern-mongodb
    restart: unless-stopped
    # Port mapping kept for dev database access if needed,
    # but in production, this would be internal only.
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-kern}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-kernpass}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-kern}
    volumes:
      - mongodb_data:/data/db
    networks:
      - kern-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: kern-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-kern}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-kernpass}
    networks:
      - kern-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── API Gateway (Public Entry Point) ─────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
        PORT: 3000
    container_name: kern-api-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      GATEWAY_PORT: 3000
      CONSUL_URL: http://consul:8500
    depends_on:
      consul:
        condition: service_healthy
    networks:
      - kern-network

  # ─── Auth Service ─────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: auth-service
        PORT: 3000
    container_name: kern-auth-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      SERVICE_NAME: auth-service
      CONSUL_URL: http://consul:8500
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    networks:
      - kern-network
    depends_on:
      consul:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─── Organizations Service ────────────────────────────────────────────────────
  organizations-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: organizations-service
        PORT: 3000
    container_name: kern-organizations-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      SERVICE_NAME: organizations-service
      CONSUL_URL: http://consul:8500
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
    networks:
      - kern-network
    depends_on:
      consul:
        condition: service_healthy

  # ─── Projects Service ─────────────────────────────────────────────────────────
  projects-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: projects-service
        PORT: 3000
    container_name: kern-projects-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      SERVICE_NAME: projects-service
      CONSUL_URL: http://consul:8500
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
    networks:
      - kern-network
    depends_on:
      consul:
        condition: service_healthy

  # ─── Content Service (Kanban / Calendar) ──────────────────────────────────────
  content-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: content-service
        PORT: 3000
    container_name: kern-content-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      SERVICE_NAME: content-service
      CONSUL_URL: http://consul:8500
      MONGODB_URI: ${MONGODB_URI}
    networks:
      - kern-network
    depends_on:
      consul:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  # ─── Social Service ───────────────────────────────────────────────────────────
  social-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: social-service
        PORT: 3000
    container_name: kern-social-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      SERVICE_NAME: social-service
      CONSUL_URL: http://consul:8500
      MONGODB_URI: ${MONGODB_URI}
    networks:
      - kern-network
    depends_on:
      consul:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  # ─── Notifications Service ────────────────────────────────────────────────────
  notifications-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notifications-service
        PORT: 3000
    container_name: kern-notifications-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      SERVICE_NAME: notifications-service
      CONSUL_URL: http://consul:8500
      MONGODB_URI: ${MONGODB_URI}
      RESEND_API_KEY: ${RESEND_API_KEY}
    networks:
      - kern-network
    depends_on:
      consul:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─── Billing Service ──────────────────────────────────────────────────────────
  billing-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: billing-service
        PORT: 3000
    container_name: kern-billing-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      SERVICE_NAME: billing-service
      CONSUL_URL: http://consul:8500
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    networks:
      - kern-network
    depends_on:
      consul:
        condition: service_healthy

  # ─── AI Service ───────────────────────────────────────────────────────────────
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: ai-service
        PORT: 3000
    container_name: kern-ai-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      SERVICE_NAME: ai-service
      CONSUL_URL: http://consul:8500
      MONGODB_URI: ${MONGODB_URI}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    networks:
      - kern-network
    depends_on:
      consul:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  # ─── Admin Service ────────────────────────────────────────────────────────────
  admin-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: admin-service
        PORT: 3000
    container_name: kern-admin-service
    restart: unless-stopped
    # Kept port 3009 for Admin UI access, but service runs on 3000 internally.
    ports:
      - "${ADMIN_PORT:-3009}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      ADMIN_PORT: 3000
      SERVICE_NAME: admin-service
      CONSUL_URL: http://consul:8500
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      MONGODB_URI: ${MONGODB_URI}
      ADMIN_SECRET: ${ADMIN_SECRET:-change-me-in-production}
    networks:
      - kern-network
    depends_on:
      consul:
        condition: service_healthy
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:

networks:
  kern-network:
    driver: bridge
