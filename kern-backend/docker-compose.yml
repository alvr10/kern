services:
  # Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: hopecore-app-development
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    networks:
      - hopecore-network
    command: sh -c "rm -f tsconfig.tsbuildinfo && exec npm run start:dev"

networks:
  hopecore-network:
    driver: bridge
