services:
  # ─── Infrastructure ───────────────────────────────────────────────────────────
  consul:
    image: consul:1.15.4
    container_name: kern-consul
    restart: unless-stopped
    ports:
      - "8500:8500" # UI + API
    command: agent -dev -client=0.0.0.0 -ui
    networks:
      - kern-network
    healthcheck:
      test: [ "CMD", "consul", "members" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: kern-mongodb
    restart: unless-stopped
    # Port mapping kept for dev database access if needed,
    # but in production, this would be internal only.
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-kern}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-kernpass}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-kern}
    volumes:
      - mongodb_data:/data/db
    networks:
      - kern-network
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: kern-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-kern}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-kernpass}
    networks:
      - kern-network
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── API Gateway (Public Entry Point) ─────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
        PORT: 3000
    container_name: kern-api-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      GATEWAY_PORT: 3000
      CONSUL_URL: http://consul:8500
      # OpenTelemetry Auto-Instrumentation
      NODE_OPTIONS: "--require @opentelemetry/auto-instrumentations-node/register"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy:4318"
      OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
      OTEL_TRACES_SAMPLER_ARG: "0.1"
      OTEL_BSP_MAX_QUEUE_SIZE: "4096"
      OTEL_BSP_EXPORT_TIMEOUT: "10000"
      OTEL_SERVICE_NAME: "api-gateway"
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=kern,deployment.environment=${NODE_ENV}"
    depends_on:
      consul:
        condition: service_healthy
      alloy:
        condition: service_started
    networks:
      - kern-network

  # ─── Organizations Service ────────────────────────────────────────────────────
  organizations-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: organizations-service
        PORT: 3000
    container_name: kern-organizations-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      SERVICE_NAME: organizations-service
      CONSUL_URL: http://consul:8500
      DATABASE_URL: ${DATABASE_URL}
      # OpenTelemetry Auto-Instrumentation
      NODE_OPTIONS: "--require @opentelemetry/auto-instrumentations-node/register"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy:4318"
      OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
      OTEL_TRACES_SAMPLER_ARG: "0.1"
      OTEL_BSP_MAX_QUEUE_SIZE: "4096"
      OTEL_BSP_EXPORT_TIMEOUT: "10000"
      OTEL_SERVICE_NAME: "organizations-service"
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=kern,deployment.environment=${NODE_ENV}"
    networks:
      - kern-network
    depends_on:
      consul:
        condition: service_healthy
      alloy:
        condition: service_started

  # ─── Content Service (Kanban / Calendar) ──────────────────────────────────────
  content-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: content-service
        PORT: 3000
    container_name: kern-content-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      SERVICE_NAME: content-service
      CONSUL_URL: http://consul:8500
      MONGODB_URI: ${MONGODB_URI}
      # OpenTelemetry Auto-Instrumentation
      NODE_OPTIONS: "--require @opentelemetry/auto-instrumentations-node/register"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy:4318"
      OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
      OTEL_TRACES_SAMPLER_ARG: "0.1"
      OTEL_BSP_MAX_QUEUE_SIZE: "4096"
      OTEL_BSP_EXPORT_TIMEOUT: "10000"
      OTEL_SERVICE_NAME: "content-service"
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=kern,deployment.environment=${NODE_ENV}"
    networks:
      - kern-network
    depends_on:
      consul:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      alloy:
        condition: service_started

  # ─── Social Service ───────────────────────────────────────────────────────────
  social-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: social-service
        PORT: 3000
    container_name: kern-social-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      SERVICE_NAME: social-service
      CONSUL_URL: http://consul:8500
      MONGODB_URI: ${MONGODB_URI}
      # OpenTelemetry Auto-Instrumentation
      NODE_OPTIONS: "--require @opentelemetry/auto-instrumentations-node/register"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy:4318"
      OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
      OTEL_TRACES_SAMPLER_ARG: "0.1"
      OTEL_BSP_MAX_QUEUE_SIZE: "4096"
      OTEL_BSP_EXPORT_TIMEOUT: "10000"
      OTEL_SERVICE_NAME: "social-service"
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=kern,deployment.environment=${NODE_ENV}"
    networks:
      - kern-network
    depends_on:
      consul:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      alloy:
        condition: service_started

  # ─── Notifications Service ────────────────────────────────────────────────────
  notifications-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notifications-service
        PORT: 3000
    container_name: kern-notifications-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      SERVICE_NAME: notifications-service
      CONSUL_URL: http://consul:8500
      MONGODB_URI: ${MONGODB_URI}
      RESEND_API_KEY: ${RESEND_API_KEY}
      # OpenTelemetry Auto-Instrumentation
      NODE_OPTIONS: "--require @opentelemetry/auto-instrumentations-node/register"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy:4318"
      OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
      OTEL_TRACES_SAMPLER_ARG: "0.1"
      OTEL_BSP_MAX_QUEUE_SIZE: "4096"
      OTEL_BSP_EXPORT_TIMEOUT: "10000"
      OTEL_SERVICE_NAME: "notifications-service"
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=kern,deployment.environment=${NODE_ENV}"
    networks:
      - kern-network
    depends_on:
      consul:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      alloy:
        condition: service_started

  # ─── Billing Service ──────────────────────────────────────────────────────────
  billing-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: billing-service
        PORT: 3000
    container_name: kern-billing-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      SERVICE_NAME: billing-service
      CONSUL_URL: http://consul:8500
      DATABASE_URL: ${DATABASE_URL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      # OpenTelemetry Auto-Instrumentation
      NODE_OPTIONS: "--require @opentelemetry/auto-instrumentations-node/register"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy:4318"
      OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
      OTEL_TRACES_SAMPLER_ARG: "0.1"
      OTEL_BSP_MAX_QUEUE_SIZE: "4096"
      OTEL_BSP_EXPORT_TIMEOUT: "10000"
      OTEL_SERVICE_NAME: "billing-service"
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=kern,deployment.environment=${NODE_ENV}"
    networks:
      - kern-network
    depends_on:
      consul:
        condition: service_healthy
      alloy:
        condition: service_started

  # ─── AI Service ───────────────────────────────────────────────────────────────
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: ai-service
        PORT: 3000
    container_name: kern-ai-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      SERVICE_NAME: ai-service
      CONSUL_URL: http://consul:8500
      MONGODB_URI: ${MONGODB_URI}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      # OpenTelemetry Auto-Instrumentation
      NODE_OPTIONS: "--require @opentelemetry/auto-instrumentations-node/register"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy:4318"
      OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
      OTEL_TRACES_SAMPLER_ARG: "0.1"
      OTEL_BSP_MAX_QUEUE_SIZE: "4096"
      OTEL_BSP_EXPORT_TIMEOUT: "10000"
      OTEL_SERVICE_NAME: "ai-service"
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=kern,deployment.environment=${NODE_ENV}"
    networks:
      - kern-network
    depends_on:
      consul:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      alloy:
        condition: service_started

  # ─── Admin Service ────────────────────────────────────────────────────────────
  admin-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: admin-service
        PORT: 3000
    container_name: kern-admin-service
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-3009}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      ADMIN_PORT: 3000
      SERVICE_NAME: admin-service
      CONSUL_URL: http://consul:8500
      DATABASE_URL: ${DATABASE_URL}
      MONGODB_URI: ${MONGODB_URI}
      ADMIN_SECRET: ${ADMIN_SECRET:-change-me-in-production}
      # OpenTelemetry Auto-Instrumentation
      NODE_OPTIONS: "--require @opentelemetry/auto-instrumentations-node/register"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy:4318"
      OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
      OTEL_TRACES_SAMPLER_ARG: "0.1"
      OTEL_BSP_MAX_QUEUE_SIZE: "4096"
      OTEL_BSP_EXPORT_TIMEOUT: "10000"
      OTEL_SERVICE_NAME: "admin-service"
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=kern,deployment.environment=${NODE_ENV}"
    networks:
      - kern-network
    depends_on:
      consul:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      alloy:
        condition: service_started

  # ─── Observability (LGTM Stack) ──────────────────────────────────────────────────────────
  alloy:
    image: grafana/alloy:latest
    container_name: kern-alloy
    restart: unless-stopped
    ports:
      - "12345:12345" # UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    volumes:
      - ./infra/alloy/config.alloy:/etc/alloy/config.alloy
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    networks:
      - kern-network

  mimir:
    image: grafana/mimir:latest
    container_name: kern-mimir
    restart: unless-stopped
    ports:
      - "9009:9009"
    volumes:
      - ./infra/mimir/mimir-config.yml:/etc/mimir/mimir.yaml
      - mimir_data:/data
    command: -config.file=/etc/mimir/mimir.yaml
    depends_on:
      createbuckets:
        condition: service_completed_successfully
    networks:
      - kern-network

  tempo:
    image: grafana/tempo:2.6.1
    container_name: kern-tempo
    restart: unless-stopped
    ports:
      - "3200:3200" # Search / UI
    volumes:
      - ./infra/tempo/tempo-config.yml:/etc/tempo.yaml
      - tempo_data:/var/tempo
    command: -config.file=/etc/tempo.yaml
    networks:
      - kern-network

  loki:
    image: grafana/loki:latest
    container_name: kern-loki
    restart: unless-stopped
    ports:
      - "3101:3100"
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    networks:
      - kern-network

  grafana:
    image: grafana/grafana:latest
    container_name: kern-grafana
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    networks:
      - kern-network
    depends_on:
      - mimir
      - tempo
      - loki

  minio:
    image: minio/minio:latest
    container_name: kern-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: mimir
      MINIO_ROOT_PASSWORD: mimirpass
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - kern-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc:latest
    container_name: kern-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - kern-network
    entrypoint: >
      /bin/sh -c " mc alias set myminio http://minio:9000 mimir mimirpass; mc mb
      --ignore-existing myminio/mimir; exit 0; "

volumes:
  mongodb_data:
  mimir_data:
  tempo_data:
  loki_data:
  grafana_data:
  minio_data:

networks:
  kern-network:
    driver: bridge
