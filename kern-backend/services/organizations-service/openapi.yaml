openapi: 3.0.0
info:
  title: KERN Organizations Service
  version: 1.0.0
  description: Manages organizations, memberships, and invitations.

tags:
  - name: Organizations
  - name: Members
  - name: Invitations
  - name: Health

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: orgsHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /organizations:
    get:
      tags: [Organizations]
      summary: List organizations the current user belongs to
      operationId: listOrganizations
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrganizationResponse'

    post:
      tags: [Organizations]
      summary: Create a new organization
      operationId: createOrganization
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationDto'
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '409':
          description: Slug already taken

  /organizations/{id}:
    get:
      tags: [Organizations]
      summary: Get an organization by ID
      operationId: getOrganization
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Organization detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '404':
          description: Not found

    patch:
      tags: [Organizations]
      summary: Update an organization
      operationId: updateOrganization
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrganizationDto'
      responses:
        '200':
          description: Updated organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'

    delete:
      tags: [Organizations]
      summary: Soft-delete an organization
      operationId: deleteOrganization
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Deleted
        '403':
          description: Forbidden - Personal organizations cannot be deleted.

  /organizations/{id}/owner:
    patch:
      tags: [Organizations]
      summary: Transfer organization ownership
      description: Transfers ownership to another member. Only allowed for TEAM organizations.
      operationId: transferOwnership
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferOwnershipDto'
      responses:
        '200':
          description: Ownership transferred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '403':
          description: Forbidden - Only current owner can transfer, or organization is PERSONAL.

  /organizations/{id}/members:
    get:
      tags: [Members]
      summary: List members of an organization
      operationId: listMembers
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MembershipResponse'

  /organizations/{id}/members/{memberId}:
    patch:
      tags: [Members]
      summary: Update a member's role
      operationId: updateMemberRole
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  $ref: '#/components/schemas/MemberRole'
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipResponse'

    delete:
      tags: [Members]
      summary: Remove a member from an organization
      operationId: removeMember
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Member removed

  /organizations/{id}/invitations:
    post:
      tags: [Invitations]
      summary: Invite a user to an organization
      operationId: inviteUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteUserDto'
      responses:
        '201':
          description: Invitation sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationResponse'
        '403':
          description: Forbidden - Invitations are not allowed for personal organizations.

  /invitations/{token}/accept:
    post:
      tags: [Invitations]
      summary: Accept an invitation by token
      operationId: acceptInvitation
      security:
        - bearerAuth: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invitation accepted
        '404':
          description: Token not found
        '410':
          description: Token expired or revoked

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
        timestamp:
          type: string
          format: date-time

    MemberRole:
      type: string
      enum: [ADMIN, EDITOR, VIEWER]

    OrganizationType:
      type: string
      enum: [PERSONAL, TEAM]

    CreateOrganizationDto:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
        slug:
          type: string
          pattern: '^[a-z0-9-]+$'
        logoUrl:
          type: string
          nullable: true

    UpdateOrganizationDto:
      type: object
      properties:
        name:
          type: string
        logoUrl:
          type: string
          nullable: true
        brandVoice:
          type: object

    TransferOwnershipDto:
      type: object
      required: [newOwnerId]
      properties:
        newOwnerId:
          type: string
          description: The ID of the profile to transfer ownership to.

    OrganizationResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        type:
          $ref: '#/components/schemas/OrganizationType'
        ownerId:
          type: string
        logoUrl:
          type: string
          nullable: true
        brandVoice:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MembershipResponse:
      type: object
      properties:
        id:
          type: string
        profileId:
          type: string
        organizationId:
          type: string
        role:
          $ref: '#/components/schemas/MemberRole'
        joinedAt:
          type: string
          format: date-time

    InviteUserDto:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/MemberRole'

    InvitationResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        role:
          $ref: '#/components/schemas/MemberRole'
        status:
          type: string
          enum: [PENDING, ACCEPTED, EXPIRED, REVOKED]
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
