openapi: 3.0.0
info:
  title: KERN Notifications Service
  version: 1.0.0
  description: In-app notifications and email delivery. Consumes events from RabbitMQ.

tags:
  - name: Notifications
  - name: Health

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: notificationsHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /notifications:
    get:
      tags: [Notifications]
      summary: List notifications for the current user
      operationId: listNotifications
      security:
        - bearerAuth: []
      parameters:
        - name: read
          in: query
          required: false
          schema:
            type: boolean
          description: Filter by read status
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedNotificationsResponse'

  /notifications/unread-count:
    get:
      tags: [Notifications]
      summary: Get unread notification count for the current user
      operationId: getUnreadCount
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer

  /notifications/{id}/read:
    patch:
      tags: [Notifications]
      summary: Mark a notification as read
      operationId: markAsRead
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Notification marked as read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
        '404':
          description: Not found

  /notifications/read-all:
    patch:
      tags: [Notifications]
      summary: Mark all notifications as read for the current user
      operationId: markAllAsRead
      security:
        - bearerAuth: []
      responses:
        '204':
          description: All notifications marked as read

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
        timestamp:
          type: string
          format: date-time

    NotificationType:
      type: string
      enum:
        - INVITATION
        - TOKEN_ALERT_80
        - TOKEN_ALERT_100
        - CONTENT_APPROVED
        - CONTENT_REJECTED
        - PLAN_UPGRADED

    NotificationResponse:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        organizationId:
          type: string
          nullable: true
        type:
          $ref: '#/components/schemas/NotificationType'
        title:
          type: string
        body:
          type: string
        read:
          type: boolean
        metadata:
          type: object
          nullable: true
          description: Additional context containing invitation or content details
          properties:
            organizationName:
              type: string
              description: The name of the organization the user is invited to.
            organizationId:
              type: string
              description: The ID of the organization the user is invited to.
            role:
              type: string
              description: The role the user is invited as.
            inviterName:
              type: string
              description: The name of the person who sent the invitation.
            inviterId:
              type: string
              description: The ID of the inviter.
            token:
              type: string
              description: The unique token to accept the invitation.
        createdAt:
          type: string
          format: date-time

    PaginatedNotificationsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/NotificationResponse'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
